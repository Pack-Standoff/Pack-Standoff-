<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Standoff</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">
    <link rel="stylesheet" href="https://pack-standoff.vercel.app/Eurostile-Reg.ttf.otf">


    <style>
        @font-face {
            font-family: 'Eurostile';
            src: url('https://pack-standoff.vercel.app/Eurostile-Reg.ttf.otf') format('opentype');
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1C1C1C;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url("https://pack-standoff.vercel.app/Pack_So2_Background_S11_BKT.png");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        html,
        body {
            max-width: 100vw;
            overflow-x: hidden;
        }

        .navbar {
            width: 100%;
            background-color: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .logo img {
            height: auto;
            width: auto;
            display: block;
            font-size: 10px;
        }


        .container {
            background-color: transparent;
            padding: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            margin-top: 20px;
            color: #fff;
            height: 100%;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }


        @media (max-width: 1200px) {
            .container {
                width: 80%;
            }
        }

        @media (max-width: 768px) {
            .container {
                width: 80%;
            }

            .navbar {
                font-size: 22px;
            }
        }

        @media (max-width: 600px) {
            .container {
                width: 90%;
            }

            .navbar {
                font-size: 20px;
            }
        }

        @media (min-width: 1200px) {
            .container {
                width: 70%;
                max-width: 1200px;
            }

            .navbar {
                padding: 10px 30px;
            }

            .logo img {
                width: 150px;
                height: auto;
            }
        }



        .square {
            width: 25%;
            height: 150px;
            background-color: transparent;
            text-align: center;
            color: black;
            font-weight: bold;
            font-size: 20px;
            line-height: 150px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            margin: 0 5px;
        }

        .square:hover {
            background-color: #f0f0f0;
        }

        .hidden {
            display: none;
        }

        .pack-info {
            text-align: center;
            margin: 0px 0;
            padding: 20px;
            color: #fff;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            z-index: 2
        }

        .pack-info .title {
            font-weight: bold;
            font-size: 15px;
            color: #fff;
            margin-bottom: 0px;
        }

        .pack-info .description {
            font-family: 'Eurostile', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            margin: 0px 0;
            word-wrap: break-word;
        }

        .pack-info img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 0px 0;
        }

        /* Para telas maiores */
        @media (min-width: 1200px) {
            .pack-info img {
                width: 150%;
                max-width: none;
                margin-left: -25%;
            }
        }

        /* Para tablets */
        @media (min-width: 768px) and (max-width: 1199px) {
            .pack-info img {
                width: 90%;
                max-width: 1200px;
            }
        }

        /* Para celulares */
        @media (max-width: 767px) {
            .pack-info img {
                width: 100%;
                max-width: 100%;
            }
        }

        .view-btn {
            padding: 6px 25px;
            font-size: 15px;
            font-family: 'Bebas Neue', sans-serif;
            border: none;
            background: linear-gradient(to bottom,
                    #9fabc9,
                    #9fabc9,
                    #8f9cbc,
                    #8090b0,
                    #6f7f9e,
                    #667695,
                    #5c6b89);
            color: #fff;
            cursor: pointer;
            transition: background-color 0.25s ease, transform 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Estado padrão escuro */
        .view-btn.is-disabled {
            background-color: #8a5714;
            /* escuro */
            color: rgba(255, 255, 255, 0.9);
        }

        /* Hover azul (igual antes) */
        .view-btn.is-disabled:hover {
            background-color: #7c9bce;
        }

        /* Feedback de clique */
        .view-btn.is-disabled:active {
            transform: scale(0.97);
        }

        .novidades {
            font-size: 25px;
            margin-top: 20px;
            margin-bottom: 0px;
            font-family: 'Bebas Neue', sans-serif;
            display: inline;
        }

        .novidades .tabela {
            background: linear-gradient(to bottom, #ffffff, #d3d3d3, #444444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .novidades .pack {
            background: linear-gradient(to bottom,
                    #9fabc9,
                    #9fabc9,
                    #8f9cbc,
                    #8090b0,
                    #6f7f9e,
                    #667695,
                    #5c6b89);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-voltar {
            background-color: #e79726;
            color: white;
            padding: 3px 20px;
            border: none;
            cursor: pointer;
            font-family: 'Bebas Neue';
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;

        }

        .bottom-voltar:hover {
            background-color: #7c9bce;
        }

        .neve {
            position: fixed;
            top: -20px;
            pointer-events: none;
            border-radius: 90%;
            background: white;
            opacity: 0.5;
            animation-name: cair;
            animation-timing-function: linear;
            z-index: -99;
        }

        @keyframes cair {
            from {
                transform: translateX(0) translateY(0);
            }

            to {
                transform: translateX(var(--swing)) translateY(110vh);
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="https://pack-standoff.vercel.app/Pack_So2_Logo_BKT.png" alt="imagem" style="width: 100px; height: 15px; margin-left: 10%; object-fit: cover;" oncontextmenu="return false;">
        </div>
    </div>
    <p class="novidades"><span class="tabela">Amostra</span> <span class="pack">Gratis</span></p>
    <div style="text-align: center; margin-top: 0px; margin-bottom: -20px;">
        <p style="color: white; font-family: 'Eurostile'; font-size: 15px;">
    </div>
    <div class="pack-info">
        <img src="https://pack-standoff.vercel.app/Pack_So2_Amostra3.png" alt="Amostra Gratis" oncontextmenu="return false;" loading="eager" decoding="async">
        <div class="description">
            Dê o primeiro passo para elevar seu conteúdo! Experimente a qualidade premium que faz nosso Pack serem os favoritos entre os criadores.
        </div>
    </div>
    <button class="view-btn" onclick="return false;">Download</button>
    <div style="text-align: center;">
        <button class="bottom-voltar" style="margin-top: 200px; margin-bottom: 30px;" onclick="voltarParaPaginaAnterior()">Voltar</button>
    </div>
    <script>
        function voltarParaPaginaAnterior() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "https://pack-standoff.vercel.app/Pack%20So2.Html";
            }
        }



        document.addEventListener("DOMContentLoaded", () => {

            function criarFloco() {
                const floco = document.createElement("div");
                floco.classList.add("neve");

                // posição inicial
                floco.style.left = Math.random() * 400 + "vw";

                // tamanho (pontinhos grandes e pequenos)
                const tamanho = Math.random() < 0.4 ?
                    2 + Math.random() * 2 // pequenos
                    :
                    3 + Math.random() * 3; // grandes

                floco.style.width = tamanho + "px";
                floco.style.height = tamanho + "px";

                // opacidade variável
                floco.style.opacity = 0.4 + Math.random() * 0.6;

                // duração da queda
                const duracao = 6 + Math.random() * 8;
                floco.style.animationDuration = duracao + "s";

                // balanço lateral
                const swing = (Math.random() * 200) - 100;
                floco.style.setProperty("--swing", swing + "px");

                document.body.appendChild(floco);

                floco.addEventListener("animationend", () => floco.remove());
            }

            function soltarNeve() {
                const quantidade = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < quantidade; i++) {
                    criarFloco();
                }
            }

            setInterval(soltarNeve, 700);
        });
    </script>
</body>

</html>
